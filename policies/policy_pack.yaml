# ITFDS Policy Pack
# Controls thresholds, tolerances, and routing rules for the pipeline.
# Edit these values to reconfigure system behaviour without changing code.

examination:
  # UCP 600 Art. 18c / 37: tolerance on L/C amount (%)
  amount_tolerance_pct: 5.0
  # UCP 600 Art. 14b: max days after transport document date to present
  presentation_period_days: 21
  # Require at least one original of each document (UCP 600 Art. 17)
  require_originals: true

discrepancy:
  # Automatically refuse if any major discrepancy is found
  major_auto_refuse: true
  # Route to manual review if only minor discrepancies exist
  minor_manual_review: true
  # Minor discrepancies eligible for automatic waiver (e.g. trivial typos)
  auto_waive_trivial_typos: false

sanctions:
  # Minimum fuzzy-match score (0–100) to flag a potential hit
  match_threshold: 85
  # Freeze processing immediately on any confirmed hit
  freeze_on_hit: true
  # Countries under full embargo — immediate freeze
  embargoed_countries: [IR, KP, SY, CU, BY]
  # Countries flagged for enhanced due diligence
  high_risk_countries: [RU, VE, MM, SD, ZW]

routing:
  # Decision outcomes and their SWIFT message type
  honour_swift_type: MT752
  refuse_swift_type: MT734
  manual_review_swift_type: MT752

waiver:
  # Minor data-quality and input-validation findings are auto-waived (not blocking)
  auto_waive_data_quality: true
  # Classifications:
  #   WAIVABLE_AUTO             — bank proceeds without contacting the applicant
  #   WAIVABLE_NEEDS_APPLICANT  — applicant must confirm before settlement
  #   NON_WAIVABLE              — fraud, sanctions, missing doc, currency mismatch

fraud:
  # Minimum fraud risk score (0–100) to escalate to MANUAL_REVIEW
  risk_score_review_threshold: 20
  # Synthetic/template markers on core settlement docs (L/C, B/L) → major finding
  synthetic_marker_core_doc_severity: major
  # Synthetic/template markers on supporting docs (invoice, COO, packing list) → minor
  synthetic_marker_supporting_doc_severity: minor
  # Invoice total does not match qty × unit price → major finding
  arithmetic_mismatch_severity: major
  # Invoice references wrong L/C number → major finding
  lc_reference_mismatch_severity: major
  # B/L or invoice date after L/C expiry → major finding
  date_after_expiry_severity: major
  # COO issued >5 days after B/L → minor finding
  coo_date_anomaly_severity: minor

severity:
  amount_mismatch: major
  currency_mismatch: major
  party_mismatch: major
  late_presentation: major
  late_shipment: major
  missing_document: major
  sanctions_hit: critical
  fraud_synthetic_marker: major
  fraud_arithmetic_mismatch: major
  fraud_lc_reference_mismatch: major
  fraud_date_anomaly: major
  low_confidence: minor